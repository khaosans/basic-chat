[tool.poetry]
name = "rag-chatbot"
version = "0.1.0"
description = "RAG-enabled chatbot with local models"
authors = ["Your Name <your.email@example.com>"]
packages = [{include = "rag_chatbot"}]

[tool.poetry.dependencies]
python = ">=3.11,<3.12"
streamlit = "^1.32.0"
langchain = "^0.1.0"
langchain-community = "^0.0.27"
chromadb = "^0.4.22"
pillow = "^11.0.0"
pytesseract = "^0.3.10"
unstructured = {extras = ["all-docs"], version = "^0.12.0"}
python-magic = "^0.4.27"
pdf2image = "^1.17.0"
pdfminer-six = "^20231228"
numpy = "^1.26.0"
requests = "^2.31.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.0.0"
black = "^23.0.0"
isort = "^5.12.0"
mypy = "^1.5.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 88
target-version = ['py38']
include = '\.pyi?$'

[tool.isort]
profile = "black"
multi_line_output = 3